worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Use Docker's internal DNS resolver so upstream hostnames are re-resolved
  # after a container is rebuilt, without needing to restart the gateway.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 8000;
    listen [::]:8000;

    server_name _;

    # Static maintenance page used for upstream failures.
    error_page 500 502 503 504 =503 /maintenance.html;

    location = /maintenance.html {
      alias /usr/share/nginx/html/maintenance/maintenance.html;
      internal;
      add_header Cache-Control "no-store";
    }

    location / {
      # Using a variable forces nginx to re-resolve via the resolver above
      # instead of caching the IP at startup.
      set $upstream http://web:8000;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_intercept_errors on;
    }
  }
}
