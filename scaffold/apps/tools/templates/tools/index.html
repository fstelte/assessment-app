{% extends "base.html" %}
{% block title %}Security Tools{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-[var(--color-text)] mb-1">Security &amp; Assessment Tools</h1>
  <p class="text-[var(--color-muted)] text-sm">Standalone tools to support your security and compliance work.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for tool in tools %}
  <a href="{{ url_for(tool.endpoint) }}"
     class="block bg-[var(--color-card)] border border-[var(--color-border)] rounded-xl p-5 hover:border-[var(--color-accent)] transition-colors group no-underline">
    <div class="text-3xl mb-3">{{ tool.icon }}</div>
    <h2 class="text-base font-semibold text-[var(--color-text)] mb-1 group-hover:text-[var(--color-accent)] transition-colors">{{ tool.label }}</h2>
    <p class="text-sm text-[var(--color-muted)]">{{ tool.description }}</p>
  </a>
  {% endfor %}
</div>
{% endblock %}
